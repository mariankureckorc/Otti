<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Otti — Mobile UI mockups (print)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  @page { size: A3 landscape; margin: 10mm; }

  :root {
    --page-w: 410mm;      /* A3 landscape minus margins */
    --page-h: 277mm;
    --bg: #f0eee9;
  }

  html, body { margin: 0; padding: 0; background: var(--bg); }
  body { font-family: 'Plus Jakarta Sans', -apple-system, system-ui, sans-serif; -webkit-font-smoothing: antialiased; color: #171B2A; }
  * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  .doc { display: flex; flex-direction: column; align-items: center; gap: 12mm; padding: 12mm 0; }

  .page {
    width: var(--page-w);
    height: var(--page-h);
    background: #fff;
    box-sizing: border-box;
    padding: 14mm 18mm 12mm;
    position: relative;
    break-after: page;
    page-break-after: always;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0,0,0,0.06);
  }
  .page:last-child { break-after: auto; page-break-after: auto; }

  .page-head { margin-bottom: 8mm; }
  .kicker {
    font-size: 11pt; font-weight: 700; color: #163A78;
    letter-spacing: 1.2px; text-transform: uppercase;
  }
  .page-head h1 {
    font-size: 22pt; font-weight: 800; color: #0C2150; letter-spacing: -0.6px;
    margin: 4mm 0 0; line-height: 1.2; max-width: 280mm;
  }

  /* 2x2 grid of phone mockups */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    column-gap: 10mm;
    row-gap: 8mm;
    height: calc(100% - 32mm);
    align-items: start;
  }
  .cell {
    display: flex; flex-direction: column; align-items: center;
    break-inside: avoid; page-break-inside: avoid;
  }
  .cell-frame {
    /* Phone components render at 390x844 — scale down to fit a column.
       A3 landscape ~410mm – 36mm padding = 374mm / 4 cols / 10mm gap → ~85mm each.
       At 96dpi 390px ≈ 103mm so use transform scale. */
    width: 390px; height: 844px;
    transform: scale(0.245); transform-origin: top center;
    margin-bottom: calc(844px * -0.755);  /* collapse extra height post-scale */
  }
  .cell-label {
    margin-top: 4mm;
    font-size: 9pt; font-weight: 700; color: #4A5165; text-align: center;
  }

  /* Cover */
  .page-cover {
    background: #163A78; color: #fff;
    display: flex; align-items: center; justify-content: center;
  }
  .cover-inner { text-align: center; max-width: 220mm; }
  .cover-wordmark { margin-top: 6mm; display: flex; justify-content: center; }
  .cover-wordmark svg path:not(:nth-of-type(4)):not(:nth-of-type(5)) { fill: #fff !important; }
  .cover-sub { margin-top: 6mm; font-size: 18pt; color: rgba(255,255,255,0.85); }
  .cover-meta { margin-top: 16mm; font-size: 12pt; line-height: 1.6; color: rgba(255,255,255,0.7); }
  .cover-meta strong { color: #fff; }
  .cover-fam {
    margin-top: 14mm; font-size: 10pt; color: rgba(255,255,255,0.55);
    border-top: 1px solid rgba(255,255,255,0.15); padding-top: 6mm; max-width: 180mm; margin-left: auto; margin-right: auto;
  }

  /* System page */
  .sys-grid {
    display: grid;
    grid-template-columns: 1.4fr 1fr 1.1fr;
    gap: 8mm;
    height: calc(100% - 32mm);
  }
  .sys-card {
    background: #FBF7EE; border-radius: 8mm; padding: 8mm;
    border: 1px solid #E5E9F2;
  }
  .sys-label {
    font-size: 9pt; font-weight: 700; color: #8A92A6;
    letter-spacing: 0.6px; text-transform: uppercase; margin-bottom: 5mm;
  }
  .sys-swatches { display: grid; grid-template-columns: 1fr 1fr; gap: 4mm; }
  .sw { padding: 5mm 5mm; border-radius: 4mm; min-height: 20mm; }
  .sw-name { font-size: 10pt; font-weight: 700; }
  .sw-hex { font-size: 8pt; opacity: 0.75; margin-top: 1mm; font-variant-numeric: tabular-nums; }
  .prin { display: flex; gap: 4mm; align-items: flex-start; margin-bottom: 4mm; }
  .prin-n {
    width: 7mm; height: 7mm; border-radius: 3.5mm; background: #163A78; color: #fff;
    font-weight: 800; font-size: 9pt; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .prin-t { font-size: 10pt; color: #171B2A; line-height: 1.4; }

  @media print {
    body { background: #fff; }
    .doc { gap: 0; padding: 0; }
    .page { box-shadow: none; margin: 0; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tokens.jsx"></script>
<script type="text/babel" src="screens-auth.jsx"></script>
<script type="text/babel" src="screens-daily.jsx"></script>
<script type="text/babel" src="screens-comms.jsx"></script>
<script type="text/babel" src="screens-account.jsx"></script>
<script type="text/babel" src="app-print.jsx"></script>
</body>
</html>
