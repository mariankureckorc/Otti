<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Otti — clickable prototype</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  html, body, #root { margin: 0; padding: 0; height: 100%; }
  body {
    background: #ECE9E2;
    font-family: 'Plus Jakarta Sans', -apple-system, system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    color: #171B2A;
  }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  #loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif; color: #8A92A6; font-size: 14px;
  }
  #fatal {
    display: none; position: fixed; inset: 16px; padding: 18px 20px;
    background: #FCDFD6; color: #7a2a18; border-radius: 14px;
    font: 13px/1.5 ui-monospace, monospace; white-space: pre-wrap; overflow: auto;
    z-index: 9999;
  }
</style>
</head>
<body>
<div id="root"><div id="loading">Loading prototype…</div></div>
<pre id="fatal"></pre>

<script>
  window.addEventListener('error', (e) => {
    const f = document.getElementById('fatal');
    f.style.display = 'block';
    f.textContent = 'Script error: ' + (e.error && e.error.stack || e.message);
  });
</script>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
// iOS 26 (Liquid Glass) device frame — used by Phone.
// Exports: IOSDevice (the bezel + dynamic island + home indicator).

function IOSDevice({ children, width = 390, height = 844, dark = false }) {
  return (
    <div style={{
      width, height, borderRadius: 48, overflow: 'hidden',
      position: 'relative', background: dark ? '#000' : '#F2F2F7',
      boxShadow: '0 40px 80px rgba(0,0,0,0.18), 0 0 0 1px rgba(0,0,0,0.12)',
      fontFamily: '-apple-system, system-ui, sans-serif',
      WebkitFontSmoothing: 'antialiased',
    }}>
      {/* dynamic island */}
      <div style={{
        position: 'absolute', top: 11, left: '50%', transform: 'translateX(-50%)',
        width: 126, height: 37, borderRadius: 24, background: '#000', zIndex: 50,
      }} />

      {/* screen content */}
      <div style={{ height: '100%', display: 'flex', flexDirection: 'column' }}>
        <div style={{ flex: 1, overflow: 'auto', position: 'relative' }}>{children}</div>
      </div>

      {/* home indicator — always on top */}
      <div style={{
        position: 'absolute', bottom: 0, left: 0, right: 0, zIndex: 60,
        height: 34, display: 'flex', justifyContent: 'center', alignItems: 'flex-end',
        paddingBottom: 8, pointerEvents: 'none',
      }}>
        <div style={{
          width: 139, height: 5, borderRadius: 100,
          background: dark ? 'rgba(255,255,255,0.7)' : 'rgba(0,0,0,0.25)',
        }} />
      </div>
    </div>
  );
}

Object.assign(window, { IOSDevice });

// ─────────────────────────────────────────────────────────────
// Phone — iOS bezel + status bar wrapper
// Every screen renders inside this.
// ─────────────────────────────────────────────────────────────
function Phone({ children, bg = OTTI.cream, dark = false, time = '8:24', noStatus = false }) {
  return (
    <IOSDevice width={390} height={844} dark={dark}>
      <div style={{
        position: 'absolute', inset: 0, background: bg, overflow: 'hidden',
        fontFamily: SANS, color: OTTI.ink,
      }}>
        {!noStatus && (
          <div style={{ position: 'absolute', top: 0, left: 0, right: 0, zIndex: 30 }}>
            <OttiStatusBar dark={dark} time={time} />
          </div>
        )}
        {children}
      </div>
    </IOSDevice>
  );
}

}

// Toggle — used by reminders, notif prefs, privacy
// ─────────────────────────────────────────────────────────────
function Toggle({ on = false, onChange }) {
  const [val, setVal] = React.useState(on);
  React.useEffect(() => { setVal(on); }, [on]);
  const toggle = () => {
    const next = !val;
    setVal(next);
    if (onChange) onChange(next);
  };
  return (
    <button onClick={toggle} style={{
      width: 50, height: 30, borderRadius: 15, border: 'none', cursor: 'pointer', padding: 0,
      background: val ? OTTI.green : OTTI.lineSolid,
      position: 'relative', flexShrink: 0, transition: 'background 0.18s ease',
    }}>
      <div style={{
        position: 'absolute', top: 2, left: val ? 22 : 2, width: 26, height: 26, borderRadius: 13,
        background: '#fff', boxShadow: '0 1px 3px rgba(0,0,0,0.18)',
        transition: 'left 0.18s ease',
      }} />
    </button>
  );
}

// ─────────────────────────────────────────────────────────────
// Progress ring — used by home + log session
// ─────────────────────────────────────────────────────────────
function Ring({ size = 240, stroke = 18, pct = 72, color = OTTI.green, track = OTTI.navyTint }) {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const off = c * (1 - pct / 100);
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={track} strokeWidth={stroke} />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
              strokeDasharray={c} strokeDashoffset={off} strokeLinecap="round"
              transform={`rotate(-90 ${size/2} ${size/2})`} />
    </svg>
  );
}

  return (

      {children}
    </div>
  );
}

// Otti — sample history data
// Single source of truth for the History screen. Both the charts AND the
// headline metrics in screens-daily.jsx must read from this module — no
// numbers should be hard-coded inside the screen components.

// Pediatric guideline for a 3-year-old. Used as the daily wear target
// across Day, Week and Month views.
const DAILY_TARGET_MIN = 780; // 13h

// — Day tab ————————————————————————————————————————————————
// Today's sessions. Times are 24h "HH:MM". `label` is shown in the
// session list under the timeline chart.
const DAY_SESSIONS = [
  { start: '08:30', end: '12:15', label: 'Nursery & morning' },
  { start: '13:00', end: '16:30', label: 'Park & lunch' },
  { start: '17:00', end: '19:00', label: 'Home & wind-down' },
];

// Visible window for the horizontal timeline.
const DAY_WINDOW = { start: '06:00', end: '22:00' };

// — Week tab ————————————————————————————————————————————————
// Minutes per day, oldest → newest. The last value is "today".
const WEEK_MINUTES = [720, 540, 690, 420, 780, 660, 495];

// Reported change vs prior week, shown as a pill next to the headline.
// Sample value — no prior-week dataset is modeled here.
const WEEK_VS_LAST_PCT = 12;

// — Month tab ————————————————————————————————————————————————
// 30 days, oldest → newest. The last 7 entries match WEEK_MINUTES so
// the two views stay consistent. The earlier 23 days were designed
// to produce a realistic spread: a solid first week, one missed day,
// a patchy stretch, and a strong run before this week's dip.
const MONTH_MINUTES = [
  // Days 1–7 — solid start of the month
  800, 820, 790, 800, 810, 830, 800,
  // Days 8–14 — one missed day, then catches up
  0, 820, 810, 790, 850, 820, 810,
  // Days 15–21 — mixed week, two slips
  800, 720, 820, 790, 810, 540, 800,
  // Days 22–23 — strong run before current week
  820, 820,
  // Days 24–30 — current week (mirrors WEEK_MINUTES)
  ...WEEK_MINUTES,
];

// — Helpers ————————————————————————————————————————————————

// "HH:MM" → minutes since 00:00
function hhmmToMin(hhmm) {
  const [h, m] = hhmm.split(':').map(Number);
  return h * 60 + m;
}

// minutes → "Xh Ym"
function fmtHm(mins) {
  const h = Math.floor(mins / 60);
  const m = mins % 60;
  return `${h}h ${m}m`;
}

const WEEKDAY_SHORT = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];

// Last 7 weekday short names ending today (today is last).
function weekLabelsEndingToday(today = new Date()) {
  const todayIdx = (today.getDay() + 6) % 7; // Mon=0 … Sun=6
  const out = [];
  for (let i = 6; i >= 0; i--) {
    out.push(WEEKDAY_SHORT[(todayIdx - i + 7) % 7]);
  }
  return out;
}

// Date label for N days ago, e.g. "17 May".
function dateLabelDaysAgo(daysAgo, today = new Date()) {
  const d = new Date(today);
  d.setDate(d.getDate() - daysAgo);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

Object.assign(window, {
  DAILY_TARGET_MIN,
  DAY_SESSIONS, DAY_WINDOW,
  WEEK_MINUTES, WEEK_VS_LAST_PCT,
  MONTH_MINUTES,
  hhmmToMin, fmtHm, weekLabelsEndingToday, dateLabelDaysAgo,
});

// — Month tab — 30 thin bars + target line ————————————
function HistoryMonthView({ nav }) {
  const data = MONTH_MINUTES;
  const total = data.reduce((a, b) => a + b, 0);
  const avg = Math.round(total / data.length);
  const goalCount = data.filter(m => m >= DAILY_TARGET_MIN).length;
  const maxScale = Math.max(DAILY_TARGET_MIN, ...data) * 1.15;

  // 5 evenly-spaced x-axis ticks across 30 bars. Labels are dates.
  const tickIndices = [0, 7, 14, 21, 29];

  return (
    <>
      <div style={{ marginTop: 18, background: '#fff', borderRadius: 24, padding: '20px 18px', border: `1px solid ${OTTI.lineSolid}` }}>
        <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', gap: 12 }}>
          <div>
            <div style={{ fontSize: 12, color: OTTI.ink3, fontWeight: 600 }}>30-day average</div>
            <div style={{ fontSize: 34, fontWeight: 800, color: OTTI.navyDeep, letterSpacing: -1, marginTop: 2, fontVariantNumeric: 'tabular-nums' }}>
              {fmtHm(avg)}
            </div>
          </div>
          <div style={{ fontSize: 11, fontWeight: 700, color: OTTI.greenDark, background: OTTI.greenSoft, padding: '4px 10px', borderRadius: 12, whiteSpace: 'nowrap' }}>
            {goalCount} of {data.length} days at goal
          </div>
        </div>

        {/* Chart */}
        <div style={{ marginTop: 22, position: 'relative', height: 140 }}>
          <div style={{ position: 'absolute', inset: 0, display: 'flex', gap: 2, alignItems: 'flex-end' }}>
            {data.map((m, i) => {
              const met = m >= DAILY_TARGET_MIN;
              const missed = m === 0;
              const pct = (m / maxScale) * 100;
              return (
                <div key={i} aria-label={`Day ${i + 1}: ${fmtHm(m)}`} style={{
                  flex: 1,
                  height: missed ? 4 : `${pct}%`,
                  minHeight: missed ? 4 : 2,
                  borderRadius: 2,
                  background: missed ? OTTI.coral : (met ? OTTI.green : OTTI.navyTint),
                  opacity: missed ? 0.6 : 1,
                }} />
              );
            })}
          </div>
          {/* Target line */}
          <div style={{
            position: 'absolute', left: 0, right: 0,
            bottom: `${(DAILY_TARGET_MIN/maxScale)*100}%`,
            borderTop: `2px dashed ${OTTI.navy}`, opacity: 0.3,
          }} />
        </div>

        {/* Date axis */}
        <div style={{ marginTop: 8, position: 'relative', height: 16 }}>
          {tickIndices.map(idx => {
            const daysAgo = data.length - 1 - idx;
            const isFirst = idx === tickIndices[0];
            const isLast = idx === tickIndices[tickIndices.length - 1];
            return (
              <div key={idx} style={{
                position: 'absolute',
                left: `${(idx / (data.length - 1)) * 100}%`,
                transform: isFirst ? 'translateX(0)' : isLast ? 'translateX(-100%)' : 'translateX(-50%)',
                fontSize: 10, color: OTTI.ink3, fontWeight: 600,
                fontVariantNumeric: 'tabular-nums', whiteSpace: 'nowrap',
              }}>
                {daysAgo === 0 ? 'Today' : dateLabelDaysAgo(daysAgo)}
              </div>
            );
          })}
        </div>

        <div style={{ marginTop: 14, display: 'flex', gap: 12, fontSize: 11, color: OTTI.ink3, fontWeight: 500, flexWrap: 'wrap' }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}><div style={{ width: 9, height: 9, borderRadius: 2, background: OTTI.green }} />Goal met</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}><div style={{ width: 9, height: 9, borderRadius: 2, background: OTTI.navyTint }} />Below goal</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}><div style={{ width: 9, height: 9, borderRadius: 2, background: OTTI.coral, opacity: 0.6 }} />Missed</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 5 }}><div style={{ width: 12, borderTop: `1.5px dashed ${OTTI.navy}`, opacity: 0.5 }} />{fmtHm(DAILY_TARGET_MIN)} target</div>
        </div>
      </div>

      <InsightCallout text={`Mia hit her goal on ${goalCount} of the last ${data.length} days.`} />
    </>
  );
}

// Otti — clickable prototype.
// Single phone frame, state-driven navigation between 23 screens.
// Community is a single handoff page; no in-app forum or post composer.

const SCREEN_REGISTRY = [
  { id: 'splash',           label: '01 · Splash',                 group: 'Auth & onboarding',  C: ScreenSplash },
  { id: 'signIn',           label: '02 · Sign in',                group: 'Auth & onboarding',  C: ScreenSignIn },
  { id: 'blocked',          label: '03 · Blocked login',          group: 'Auth & onboarding',  C: ScreenBlocked },
  { id: 'childProfile',     label: '04 · Child profile setup',    group: 'Auth & onboarding',  C: ScreenChildProfile },
  { id: 'invite',           label: '05 · Invite second parent',   group: 'Auth & onboarding',  C: ScreenInvitePartner },

  { id: 'home',             label: '06 · Home / Today',           group: 'Daily use',          C: ScreenHome },
  { id: 'logSession',       label: '07 · Log session',            group: 'Daily use',          C: ScreenLogSession },
  { id: 'history',          label: '08 · History',                group: 'Daily use',          C: ScreenHistory },
  { id: 'editEntry',        label: '09 · Edit entry',             group: 'Daily use',          C: ScreenEditEntry },

  { id: 'notifPermission',  label: '10 · Notification permission', group: 'Reminders',         C: ScreenNotifPermission },
  { id: 'reminderSettings', label: '11 · Reminder settings',      group: 'Reminders',          C: ScreenReminderSettings },

  { id: 'forum',            label: '12 · Community (Hearing First)', group: 'Community',       C: ScreenForum },

  { id: 'articleList',      label: '13 · Article list',           group: 'Articles',           C: ScreenArticleList },
  { id: 'articleDetail',    label: '14 · Article detail',         group: 'Articles',           C: ScreenArticleDetail },

  { id: 'profile',          label: '15 · Profile & settings',     group: 'Account',            C: ScreenProfile },
  { id: 'notifPrefs',       label: '16 · Notification prefs',     group: 'Account',            C: ScreenNotifPrefs },
  { id: 'privacy',          label: '17 · Privacy & consent',      group: 'Account',            C: ScreenPrivacy },
  { id: 'manageParent',     label: '18 · Manage co-parent',       group: 'Account',            C: ScreenManageParent },
  { id: 'about',            label: '19 · About / version',        group: 'Account',            C: ScreenAbout },
  { id: 'signOut',          label: '20 · Sign out',               group: 'Account',            C: ScreenSignOut },

  { id: 'emptyHistory',     label: '21 · Empty history',          group: 'Mascot moments',     C: ScreenEmptyHistory },
  { id: 'targetMet',        label: '22 · Daily target met',       group: 'Mascot moments',     C: ScreenTargetMet },
  { id: 'streak',           label: '23 · First-week streak',      group: 'Mascot moments',     C: ScreenStreak },
];

const SCREEN_MAP = Object.fromEntries(SCREEN_REGISTRY.map(s => [s.id, s]));
const GROUPS = Array.from(new Set(SCREEN_REGISTRY.map(s => s.group)));

function App() {
  const [screen, setScreen] = React.useState('splash');
  const [history, setHistory] = React.useState(['splash']);
  const [drawerOpen, setDrawerOpen] = React.useState(false);

  const nav = (target) => {
    if (!SCREEN_MAP[target]) return;
    setScreen(target);
    setHistory(h => [...h, target]);
    setDrawerOpen(false);
  };

  const goBack = () => {
    setHistory(h => {
      if (h.length < 2) return h;
      const next = h.slice(0, -1);
      setScreen(next[next.length - 1]);
      return next;
    });
  };

  const reset = () => {
    setScreen('splash');
    setHistory(['splash']);
    setDrawerOpen(false);
  };

  const current = SCREEN_MAP[screen];
  const ScreenComponent = current.C;

  return (
    <div style={{
      minHeight: '100vh', width: '100%',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
      padding: '40px 20px', boxSizing: 'border-box',
      background: `radial-gradient(120% 80% at 50% 0%, #F6F2E8 0%, #ECE9E2 60%, #DDD9D0 100%)`,
    }}>
      <TopBar
        screen={current}
        onMenu={() => setDrawerOpen(true)}
        onBack={history.length > 1 ? goBack : null}
        onReset={reset}
      />

      <div style={{ position: 'relative' }}>
        <ScreenComponent nav={nav} />
      </div>

      <ScreenDrawer
        open={drawerOpen}
        current={screen}
        onClose={() => setDrawerOpen(false)}
        onPick={nav}
      />

      <BottomCredit />
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Top toolbar (outside the phone) — menu + breadcrumb + reset
// ─────────────────────────────────────────────────────────────
function TopBar({ screen, onMenu, onBack, onReset }) {
  return (
    <div style={{
      position: 'fixed', top: 16, left: 16, right: 16, zIndex: 100,
      display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      pointerEvents: 'none',
    }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, pointerEvents: 'auto' }}>
        <button onClick={onMenu} style={{
          height: 44, padding: '0 16px', borderRadius: 22,
          background: '#fff', border: `1px solid ${OTTI.lineSolid}`, cursor: 'pointer',
          display: 'flex', alignItems: 'center', gap: 8, fontFamily: SANS, fontWeight: 700, fontSize: 13,
          color: OTTI.navyDeep, boxShadow: '0 4px 12px rgba(12,33,80,0.06)',
        }}>
          <svg width="16" height="12" viewBox="0 0 16 12" fill="none">
            <path d="M1 1h14M1 6h14M1 11h14" stroke={OTTI.navyDeep} strokeWidth="2" strokeLinecap="round"/>
          </svg>
          All screens
        </button>
        {onBack && (
          <button onClick={onBack} style={{
            height: 44, width: 44, borderRadius: 22,
            background: '#fff', border: `1px solid ${OTTI.lineSolid}`, cursor: 'pointer',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            boxShadow: '0 4px 12px rgba(12,33,80,0.06)',
          }}>{Icon.back(OTTI.navyDeep, 18)}</button>
        )}
      </div>

      <div style={{
        pointerEvents: 'auto',
        display: 'flex', alignItems: 'center', gap: 8,
        height: 44, padding: '0 16px', borderRadius: 22,
        background: 'rgba(255,255,255,0.85)', backdropFilter: 'blur(12px)',
        border: `1px solid ${OTTI.lineSolid}`,
        fontFamily: SANS, fontSize: 12, color: OTTI.ink2,
      }}>
        <span style={{ color: OTTI.ink3, fontWeight: 600 }}>{screen.group}</span>
        <span style={{ color: OTTI.ink4 }}>·</span>
        <span style={{ fontWeight: 700, color: OTTI.navyDeep }}>{screen.label}</span>
      </div>

      <div style={{ pointerEvents: 'auto' }}>
        <button onClick={onReset} style={{
          height: 44, padding: '0 16px', borderRadius: 22,
          background: OTTI.navy, color: '#fff', border: 'none', cursor: 'pointer',
          fontFamily: SANS, fontWeight: 700, fontSize: 13,
          boxShadow: '0 4px 12px rgba(22,58,120,0.18)',
        }}>
          Restart
        </button>
      </div>
    </div>
  );
}

// ─────────────────────────────────────────────────────────────
// Screen drawer — left-side panel with all 25 screens
// ─────────────────────────────────────────────────────────────
function ScreenDrawer({ open, current, onClose, onPick }) {
  return (
    <>
      <div
        onClick={onClose}
        style={{
          position: 'fixed', inset: 0, background: 'rgba(12,33,80,0.35)',
          opacity: open ? 1 : 0, pointerEvents: open ? 'auto' : 'none',
          transition: 'opacity 0.18s ease', zIndex: 200,
          backdropFilter: 'blur(2px)',
        }}
      />
      <div style={{
        position: 'fixed', top: 0, bottom: 0, left: 0,
        width: 340, maxWidth: '92vw',
        background: '#fff', zIndex: 201,
        boxShadow: '0 0 40px rgba(0,0,0,0.18)',
        transform: open ? 'translateX(0)' : 'translateX(-100%)',
        transition: 'transform 0.22s ease',
        display: 'flex', flexDirection: 'column',
        fontFamily: SANS,
      }}>
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          padding: '20px 22px 14px', borderBottom: `1px solid ${OTTI.lineSolid}`,
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <Wordmark height={26} />
            <div style={{ fontSize: 11, fontWeight: 700, color: OTTI.ink3, letterSpacing: 0.4, textTransform: 'uppercase' }}>
              All screens
            </div>
          </div>
          <button onClick={onClose} style={{
            width: 32, height: 32, borderRadius: 16, border: 'none', cursor: 'pointer',
            background: OTTI.navyTint, display: 'flex', alignItems: 'center', justifyContent: 'center',
          }}>{Icon.close(OTTI.navy, 16)}</button>
        </div>

        <div style={{ flex: 1, overflowY: 'auto', padding: '6px 12px 24px' }}>
          {GROUPS.map(group => (
            <div key={group} style={{ marginTop: 14 }}>
              <div style={{
                fontSize: 11, fontWeight: 700, color: OTTI.ink3,
                letterSpacing: 0.6, textTransform: 'uppercase',
                padding: '4px 10px 6px',
              }}>{group}</div>
              {SCREEN_REGISTRY.filter(s => s.group === group).map(s => {
                const active = s.id === current;
                return (
                  <button key={s.id} onClick={() => onPick(s.id)} style={{
                    width: '100%', textAlign: 'left',
                    padding: '10px 12px', borderRadius: 10, marginBottom: 2,
                    border: 'none', cursor: 'pointer',
                    background: active ? OTTI.navyTint : 'transparent',
                    color: active ? OTTI.navyDeep : OTTI.ink,
                    fontFamily: SANS, fontSize: 14, fontWeight: active ? 700 : 500,
                    display: 'flex', alignItems: 'center', gap: 8,
                  }}>
                    {active && <div style={{ width: 6, height: 6, borderRadius: 3, background: OTTI.green }} />}
                    {!active && <div style={{ width: 6 }} />}
                    {s.label}
                  </button>
                );
              })}
            </div>
          ))}
        </div>

        <div style={{
          padding: '14px 22px', borderTop: `1px solid ${OTTI.lineSolid}`,
          fontSize: 12, color: OTTI.ink3, lineHeight: 1.5,
        }}>
          <strong style={{ color: OTTI.ink2 }}>Otti</strong> — a gentle companion for cochlear implant families. Clickable v1 prototype for SJID review.
        </div>
      </div>
    </>
  );
}

function BottomCredit() {
  return (
    <div style={{
      position: 'fixed', bottom: 16, left: '50%', transform: 'translateX(-50%)',
      fontFamily: SANS, fontSize: 11, color: OTTI.ink3, fontWeight: 500,
      background: 'rgba(255,255,255,0.7)', backdropFilter: 'blur(8px)',
      padding: '6px 14px', borderRadius: 12, border: `1px solid ${OTTI.lineSolid}`,
      zIndex: 90,
    }}>
      Tap inside the phone to navigate · Use <strong style={{ color: OTTI.navyDeep }}>All screens</strong> to jump anywhere
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
